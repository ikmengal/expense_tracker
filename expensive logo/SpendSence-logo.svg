<svg width="640" height="180" viewBox="0 0 640 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="markGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0FB88C"/>
      <stop offset="100%" stop-color="#0A6FB8"/>
    </linearGradient>
    <linearGradient id="coinGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFE08A"/>
      <stop offset="100%" stop-color="#F5B544"/>
    </linearGradient>
  </defs>

  <!-- Icon mark: rounded square badge -->
  <g transform="translate(10,10)">
    <rect x="0" y="0" width="160" height="160" rx="36" fill="url(#markGrad)"/>

    <!-- ascending bars forming an S-like rising motion -->
    <rect x="34" y="98" width="18" height="38" rx="5" fill="#FFFFFF" opacity="0.92"/>
    <rect x="62" y="80" width="18" height="56" rx="5" fill="#FFFFFF" opacity="0.96"/>
    <rect x="90" y="58" width="18" height="78" rx="5" fill="#FFFFFF"/>

    <!-- coin accent representing "spend" sitting on the trend -->
    <circle cx="116" cy="44" r="20" fill="url(#coinGrad)" stroke="#FFFFFF" stroke-width="3"/>
    <path d="M116 35 v18 M111 39 h10 a4 4 0 0 1 0 8 h-6 a4 4 0 0 0 0 8 h10" stroke="#8a5a12" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Wordmark -->
  <g transform="translate(200,0)">
    <text x="0" y="92" font-family="Arial, Helvetica, sans-serif" font-weight="800" font-size="58" letter-spacing="-1">
      <tspan fill="#10243E">Spend</tspan><tspan fill="#0FB88C">Sence</tspan>
    </text>
    <text x="2" y="124" font-family="Arial, Helvetica, sans-serif" font-weight="500" font-size="17" fill="#5C7184" letter-spacing="0.2">
      Smart expense tracking &amp; category budgeting
    </text>
    <text x="2" y="146" font-family="Arial, Helvetica, sans-serif" font-weight="500" font-size="17" fill="#5C7184" letter-spacing="0.2">
      made effortless
    </text>
  </g>
</svg>
